<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIGS - Create Pantry</title>
    <link rel="stylesheet" href="pantries-home.css">
</head>
<body>

<custom-header></custom-header>

<main>
    <section class="create-list-container">
        <h2>Create a new pantry</h2>
        <p>Give your list a name to start adding products.</p>

        <form id="create-supply-list-form">
            <div class="form-group">
                <label for="list-name">List Name *</label>
                <input type="text" id="list-name" name="list-name" placeholder="e.g., Home Pantry, Apartment..." required>
            </div>

            <div class="form-group">
                <label for="list-desc">Description (Optional)</label>
                <textarea id="list-desc" name="list-desc" rows="3" placeholder="e.g., Main list for weekly "></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel">Cancel</button>
                <button type="submit" class="btn-submit">Create List</button>
            </div>
        </form>
    </section>

    <section class="my-pantries-container">
        <h2>My Pantries</h2>
        <div id="pantries-list" class="pantries-grid">
        </div>
    </section>
</main>

<custom-footer></custom-footer>

<script src="../../header/header.js"></script>
<script src="../../footer/footer.js"></script>
<script src="pantries.js"></script>

</body>
</html>
