<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIS - Create Recipe</title>
    <link rel="stylesheet" href="recipes.css">
</head>
<body>

    <custom-header></custom-header>

    <main>
        <section class="create-recipe-container">
            <h2 id="form-title">Create a new recipe</h2>
            <p>Add the details, ingredients, and steps for your culinary masterpiece.</p>

            <form id="create-recipe-form">
                <div class="form-group">
                    <label for="recipe-name">Recipe Name *</label>
                    <input type="text" id="recipe-name" placeholder="e.g., Nudeln and cheese, Omelette..." required>
                </div>

                <div class="form-group form-row">
                    <div class="half-width">
                        <label for="prep-time">Prep Time (min)</label>
                        <input type="number" id="prep-time" placeholder="e.g., 30" min="1">
                    </div>
                    <div class="half-width">
                        <label for="portions">Servings</label>
                        <input type="number" id="portions" placeholder="e.g., 4" min="1">
                    </div>
                </div>

                <div class="ingredients-section">
                    <h3>Ingredients</h3>

                    <datalist id="dino-ingredients-results"></datalist>

                    <div id="ingredients-list"></div>

                    <button type="button" id="add-ingredient-btn" class="btn-secondary">+ Add another ingredient</button>
                </div>

                <div class="form-group">
                    <label for="recipe-process">Preparation steps *</label>
                    <textarea id="recipe-process" rows="6" required></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn-cancel">Cancel</button>
                    <button type="submit" id="btn-submit" class="btn-submit">Save Recipe</button>
                </div>
            </form>
        </section>

        <section class="my-recipes-container" style="max-width: 700px; margin: 40px auto;">
            <h2 style="color: #2c3e50; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px;">My Recipes</h2>
            <div id="recipes-gallery" class="recipe-grid">
                </div>
        </section>
    </main>

    <custom-footer></custom-footer>

    <script src="../../header/header.js"></script>
    <script src="../../footer/footer.js"></script>
    <script src="../../db/dino-mocks.js"></script>
    <script src="recipes.js"></script>

</body>
</html>
