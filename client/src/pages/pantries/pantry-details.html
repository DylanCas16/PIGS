<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIS - Inventory</title>
    <link rel="stylesheet" href="pantries-home.css">
    <style>
        .search-bar { display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-end; }
        .input-wrapper { display: flex; flex-direction: column; gap: 5px; }
        .input-wrapper label { font-size: 14px; font-weight: bold; color: #333; }

        .search-bar input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .search-bar input[type="number"] { width: 80px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        .inventory-list { list-style: none; padding: 0; margin: 0; }
        .inventory-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #fafafa; margin-bottom: 5px; border-radius: 6px; }
        .item-category { font-size: 12px; color: white; background: #2c3e50; padding: 3px 8px; border-radius: 10px; margin-left: 10px; }
    </style>
</head>
<body>

    <custom-header></custom-header>

    <main>
        <section class="create-list-container" style="max-width: 800px;">
            <h2 id="pantry-title">Charging pantry...</h2>
            <p id="pantry-desc">...</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <h3>Add product</h3>

            <div class="search-bar">
                <div class="input-wrapper" style="flex-grow: 1;">
                    <label for="product-search">Product</label>
                    <input list="dino-results" id="product-search" placeholder="Write to find (Ej. Milk, cheese)..." required>
                    <datalist id="dino-results"></datalist>
                </div>

                <div class="input-wrapper">
                    <label for="product-qty">Amount</label>
                    <input type="number" id="product-qty" value="1" min="0.1" step="0.1" title="Amount">
                </div>

                <div class="input-wrapper">
                    <label for="product-limit">Limit</label>
                    <input type="number" id="product-limit" value="1" min="0.1" step="0.1" title="Minimum" placeholder="Limit">
                </div>

                <div class="input-wrapper">
                    <button id="add-item-btn" class="btn-submit" style="padding: 12px 20px;">Add to inventory</button>
                </div>
            </div>

            <h3>Actual inventory </h3>
            <ul id="inventory-list" class="inventory-list">
                </ul>
        </section>
    </main>

    <custom-footer></custom-footer>

    <script src="../../header/header.js"></script>
    <script src="../../footer/footer.js"></script>

    <script src="../../db/dino-mocks.js"></script>
    <script src="pantry-details.js"></script>

</body>
</html>
